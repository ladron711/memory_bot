version: "3.9"

services:

  db:
    image: postgres:15
    container_name: memory_db
    restart: always
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: memory_backend
    restart: always
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/admin/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build: ./bot
    container_name: memory_bot
    restart: always
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data: